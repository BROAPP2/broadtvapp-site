    <!-- ═══ FAQ SCHEMA (boosts rich snippets in Google) ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Puedo lanzar mi propio canal de streaming sin saber programar?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. BroadTVApp es una plataforma SaaS que te permite lanzar tu canal en Roku, Apple TV, Fire TV, iOS y Android sin conocimientos técnicos. Nuestro equipo se encarga de toda la configuración técnica." }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta lanzar un canal de streaming propio?",
          "acceptedAnswer": { "@type": "Answer", "text": "El desarrollo de la WebApp base cuesta $1,499 USD (pago único). Cada plataforma adicional (Roku, Android, Fire TV) cuesta $1,499 y Apple TV/iOS $3,900. La mensualidad de hosting y mantenimiento va desde $149/mes." }
        },
        {
          "@type": "Question",
          "name": "¿BroadTVApp cobra comisión sobre mis ingresos?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. BroadTVApp solo cobra el setup fee inicial y la mensualidad fija. Tus ingresos por suscripciones, publicidad o PPV van directamente a tu cuenta Stripe sin comisiones adicionales." }
        },
        {
          "@type": "Question",
          "name": "¿Qué es SVOD, AVOD y PPV?",
          "acceptedAnswer": { "@type": "Answer", "text": "SVOD es el modelo de suscripción mensual (como Netflix). AVOD es el modelo gratuito con publicidad (como YouTube). PPV es pago por evento o contenido puntual. BroadTVApp soporta los tres modelos." }
        }
      ]
    }
    </script>
